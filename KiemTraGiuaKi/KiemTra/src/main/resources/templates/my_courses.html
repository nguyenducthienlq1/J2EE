<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Khóa học của tôi</h2>
        <a th:href="@{/home}" class="btn btn-outline-secondary">Quay lại Home</a>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover shadow-sm">
            <thead class="table-dark">
            <tr>
                <th>STT</th>
                <th>Tên học phần</th>
                <th>Tín chỉ</th>
                <th>Giảng viên</th>
                <th>Ngày đăng ký</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="enrollment, iterStat : ${enrollments}">
                <td th:text="${iterStat.count}"></td>
                <td th:text="${enrollment.course.name}"></td>
                <td th:text="${enrollment.course.credits}"></td>
                <td th:text="${enrollment.course.lecturer}"></td>
                <td th:text="${enrollment.enrollDate}"></td>
            </tr>
            <tr th:if="${enrollments.empty}">
                <td colspan="5" class="text-center text-muted">Bạn chưa đăng ký khóa học nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
