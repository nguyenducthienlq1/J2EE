<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header text-center bg-white">
                    <h3 class="mt-2">Đăng nhập</h3>
                </div>
                <div class="card-body">
                    <div th:if="${param.error}" class="alert alert-danger">Tài khoản hoặc mật khẩu không đúng.</div>
                    <div th:if="${param.logout}" class="alert alert-success">Đăng xuất thành công.</div>
                    <div th:if="${param.success}" class="alert alert-success">Đăng ký thành công! Hãy đăng nhập.</div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                    </form>
                    <div class="text-center mb-3">hoặc</div>
                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-danger w-100">Đăng nhập bằng Google</a>
                </div>
                <div class="card-footer text-center bg-white">
                    Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
