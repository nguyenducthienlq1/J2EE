<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-white">
                    <h3 class="mt-2" th:text="${course.id != null ? 'Cập nhật học phần' : 'Thêm học phần mới'}"></h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/courses/save}" th:object="${course}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Tên học phần</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số tín chỉ</label>
                            <input type="number" th:field="*{credits}" class="form-control" required min="1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Giảng viên</label>
                            <input type="text" th:field="*{lecturer}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Danh mục</label>
                            <select th:field="*{category}" class="form-select" required>
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL Hình ảnh minh họa</label>
                            <input type="text" th:field="*{image}" class="form-control" placeholder="https://example.com/image.jpg">
                        </div>

                        <div class="d-flex justify-content-end mt-4">
                            <a th:href="@{/admin/courses}" class="btn btn-secondary me-2">Hủy</a>
                            <button type="submit" class="btn btn-success">Lưu thông tin</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
