<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý học phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Danh sách quản lý học phần</h2>
        <div>
            <a th:href="@{/home}" class="btn btn-outline-secondary me-2">Home</a>
            <a th:href="@{/admin/courses/create}" class="btn btn-primary">Thêm học phần mới</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover shadow-sm">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên học phần</th>
                <th>Tín chỉ</th>
                <th>Giảng viên</th>
                <th>Danh mục</th>
                <th class="text-center">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.id}"></td>
                <td th:text="${course.name}"></td>
                <td th:text="${course.credits}"></td>
                <td th:text="${course.lecturer}"></td>
                <td th:text="${course.category != null ? course.category.name : 'Không có'}"></td>
                <td class="text-center">
                    <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-warning btn-sm me-1">Edit</a>
                    <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa học phần này?');">Delete</a>
                </td>
            </tr>
            <tr th:if="${courses.empty}">
                <td colspan="5" class="text-center text-muted">Chưa có học phần nào trong hệ thống.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
