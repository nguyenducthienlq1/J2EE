<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Home - Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">CourseApp</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                <li class="nav-item" sec:authorize="hasAuthority('STUDENT')"><a class="nav-link" th:href="@{/student/my-courses}">My Courses</a></li>
                <li class="nav-item" sec:authorize="hasAuthority('ADMIN')"><a class="nav-link" th:href="@{/admin/courses}">Quản lý học phần</a></li>
            </ul>
            <form class="d-flex" th:action="@{/home}" method="get">
                <input class="form-control me-2" type="search" name="keyword" th:value="${keyword}" placeholder="Course Name">
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>
            <ul class="navbar-nav ms-3">
                <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" th:href="@{/login}">Login</a></li>
                <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" th:href="@{/register}">Register</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button class="btn nav-link" type="submit" style="border: none; background: none; padding: 8px;">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Danh sách học phần</h2>
    <div class="row">
        <div class="col-md-4 mb-4" th:each="course : ${listCourses}">
            <div class="card h-100 shadow-sm">
                <img th:src="${course.image}" class="card-img-top" alt="Course Image" style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title" th:text="${course.name}">Course Name</h5>
                    <p class="card-text mb-1">Giảng viên: <span th:text="${course.lecturer}"></span></p>
                    <p class="card-text">Tín chỉ: <span th:text="${course.credits}"></span></p>
                </div>
                <div class="card-footer bg-white border-top-0" sec:authorize="hasAuthority('STUDENT')">
                    <a th:href="@{/student/enroll/{id}(id=${course.id})}" class="btn btn-primary w-100">Enroll</a>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center mt-4">
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i ? 'active' : ''}">
                <a class="page-link" th:href="@{/home(pageNo=${i}, keyword=${keyword})}" th:text="${i}">1</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
