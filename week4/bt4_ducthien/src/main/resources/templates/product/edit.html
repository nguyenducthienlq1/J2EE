<!DOCTYPE html>
<html lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Edit product</title>
</head>
<body>
    <div layout:fragment="content">
        <h3 class="mb-4">Edit product</h3>
        <form th:action="@{/products/edit}" th:method="post" th:object="${product}" class="form" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            <div class="form-group mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="product Name">
                <div class="alert alert-danger alert-sm mt-2" role="alert" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="form-group mb-3">
                <label for="price" class="form-label">Price:</label>
                <input type="number" class="form-control" id="price" th:field="*{price}" placeholder="price">
                <div class="alert alert-danger alert-sm mt-2" role="alert" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>
            <div class="form-group mb-3">
                <label for="image" class="form-label">Image:</label>
                <input type="file" class="form-control" id="image" name="imageProduct" accept="image/png,image/jpeg">
                <div class="alert alert-danger alert-sm mt-2" role="alert" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
            </div>
            <div class="form-group mb-3">
                <label for="category" class="form-label">Category:</label>
                <select class="form-select" id="category" name="category.id">
                    <option value="">Chọn danh mục</option>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}" th:selected="${product.category != null and category.id == product.category.id}"></option>
                </select>
            </div>
            <div class="mt-4">
                <input type="submit" class="btn btn-success" value="Update Product">
            </div>
        </form>
    </div>
</body>
</html>
