<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Sửa sách</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
	<style>
		body { background: linear-gradient(180deg, #fff8f0 0%, #ffe8d6 100%); min-height: 100vh; }
		.card-form { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(255,107,53,0.25); }
		.card-header { background: linear-gradient(135deg, #4361ee, #3a0ca3); color: #fff; font-weight: 600; border-radius: 16px 16px 0 0; padding: 1rem 1.5rem; }
		.btn-update { background: #4361ee; color: #fff; border: none; font-weight: 600; }
		.btn-update:hover { background: #3a0ca3; color: #fff; }
	</style>
</head>
<body>
	<div th:insert="~{layout :: nav}"></div>
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card card-form mt-4">
					<div class="card-header">
						<h5 class="mb-0">Sửa sách</h5>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/books/edit}" th:object="${book}" method="post">
							<input th:field="*{id}" type="hidden"/>
							<div class="mb-3">
								<label class="form-label fw-semibold">Tên sách</label>
								<input th:field="*{title}" type="text" class="form-control form-control-lg" placeholder="Nhập tên sách" required/>
							</div>
							<div class="mb-4">
								<label class="form-label fw-semibold">Tác giả</label>
								<input th:field="*{author}" type="text" class="form-control form-control-lg" placeholder="Nhập tác giả" required/>
							</div>
							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-update btn-lg">Cập nhật</button>
								<a th:href="@{/books}" class="btn btn-outline-secondary btn-lg">Hủy</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
