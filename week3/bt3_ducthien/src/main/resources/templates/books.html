<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Danh sách sách</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
	<style>
		body { background: linear-gradient(180deg, #fff8f0 0%, #ffe8d6 100%); min-height: 100vh; }
		.table-custom { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(255,107,53,0.2); }
		.table thead { background: linear-gradient(135deg, #ff6b35, #f7931e); color: #1a1a2e; }
		.btn-add { background: #06d6a0; color: #1a1a2e; border: none; font-weight: 600; }
		.btn-add:hover { background: #05c090; color: #1a1a2e; }
	</style>
</head>
<body>
	<div th:insert="~{layout :: nav}"></div>
	<div class="container">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h1 class="text-dark fw-bold">Danh sách sách</h1>
			<a th:href="@{/books/add}" class="btn btn-add btn-lg">+ Thêm sách mới</a>
		</div>
		<div class="table-custom p-0">
			<table class="table table-hover mb-0">
				<thead>
					<tr>
						<th>ID</th>
						<th>Tên sách</th>
						<th>Tác giả</th>
						<th class="text-center">Thao tác</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="b : ${books}">
						<td th:text="${b.id}" class="fw-semibold"></td>
						<td th:text="${b.title}"></td>
						<td th:text="${b.author}"></td>
						<td class="text-center">
							<a th:href="@{/books/edit/{id}(id=${b.id})}" class="btn btn-sm btn-primary me-1">Sửa</a>
							<a th:href="@{/books/delete/{id}(id=${b.id})}" class="btn btn-sm btn-danger">Xóa</a>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
