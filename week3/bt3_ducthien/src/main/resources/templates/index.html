<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Trang chủ</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
	<style>
		body { background: linear-gradient(180deg, #fff8f0 0%, #ffe8d6 100%); min-height: 100vh; }
		.hero { background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%); border-radius: 20px; color: #1a1a2e; }
		.btn-hero { background: #06d6a0; color: #1a1a2e; border: none; font-weight: 600; padding: 12px 28px; border-radius: 12px; }
		.btn-hero:hover { background: #05c090; color: #1a1a2e; }
	</style>
</head>
<body>
	<div th:insert="~{layout :: nav}"></div>
	<div class="container">
		<div class="hero p-5 my-5 text-center shadow">
			<h1 class="display-4 fw-bold mb-3">📚 Quản lý sách</h1>
			<p class="lead mb-4">Xem và quản lý danh sách sách của bạn.</p>
			<a th:href="@{/books}" class="btn btn-hero btn-lg">Xem danh sách sách</a>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
